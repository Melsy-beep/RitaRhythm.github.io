<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на занятия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 150px;
            height: auto;
            border-radius: 10px;
        }

        .button {
            display: block;
            width: 100%;
            padding: 18px 24px;
            margin-bottom: 15px;
            background: #7B68EE;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3);
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 104, 238, 0.4);
            background: #6a5acd;
        }

        .button:active {
            transform: translateY(0);
        }

        .button.whatsapp {
            background: #25D366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .button.whatsapp:hover {
            background: #128C7E;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .button.telegram {
            background: #0088cc;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .button.telegram:hover {
            background: #006699;
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
        }

        .button.phone {
            background: #FF6B6B;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .button.phone:hover {
            background: #EE5A5A;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .section-title {
            text-align: center;
            color: #333;
            font-size: 18px;
            margin: 30px 0 20px 0;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }
            
            .button {
                padding: 16px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <div class="logo">
            <img src="logo.png" alt="Логотип">
        </div>

        <!-- Основная кнопка -->
        <a href="https://your-booking-link.com" class="button">
            Запись на пробное занятие
        </a>

        <!-- Разделитель -->
        <div class="section-title">Для связи:</div>

        <!-- Кнопки связи -->
        <a href="https://wa.me/79617211017" class="button whatsapp" target="_blank">
            WhatsApp
        </a>

        <a href="https://t.me/margosidd" class="button telegram" target="_blank">
            Telegram
        </a>

        <a href="tel:+79617211017" class="button phone">
            Телефон
        </a>

        <div class="footer">
            © 2026 Все права защищены
        </div>
    </div>
</body>
</html>
